name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload artifacts

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so GoReleaser can build the changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # contents:write on the default token publishes the GitHub Release.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A PAT with contents:write on aureliushq/homebrew-tap, so GoReleaser
          # can push the updated cask to the tap repo.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
